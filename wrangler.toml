name = "tutor-blackroad"
main = "src/worker.js"
compatibility_date = "2024-09-01"
workers_dev = false

routes = [
  { pattern = "tutor.blackroad.io/*", zone_name = "blackroad.io" }
]

[[d1_databases]]
binding = "DB"
database_name = "roundtrip"
database_id = "ec4efdfb-a76e-46fb-a821-1278e17e7b90"

[ai]
binding = "AI"

[vars]
APP_URL = "https://tutor.blackroad.io"

# Set secrets with: wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put STRIPE_PRICE_ID
